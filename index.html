<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">


    <title>Servicios Beatriz - Packs</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>

    <style>
      body{
        padding: 0;
        background-color: #000000;
      }
      .parent {
        position: relative;
      }

      .full-screen{
          height: 100vh;
          background-image: url('foto1-min.png');
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-position: center;
          z-index: 0
          position: absolute;
          top: 0;
          right: 0
      }
      .full-screen2{
          height: 100vh;
          background-image: url('foto2-min.png');
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-position: center;
          z-index: 10
          position: absolute;
          top: 0;
          right: 0
          opacity: 1;
          animation: flickerAnimation 6s infinite;
      }
      @keyframes flickerAnimation { /* flame pulses */
        0%   { opacity:1; }
        50%  { opacity:0; }
        100% { opacity:1; }
      }

      .top{
        z-index: 100;
        color: white;
        position: absolute;
        top: 30vh;
        width: 100vw;
        font-size: 7em;
        text-align: center;
      }
    </style>
</head>
<body>
<div class="parent">
  <div class="full-screen">
    <div class="full-screen2">

    </div>
    <dic class="top">
        Muy Pronto, <br>Los Mejores pack de<br> America Latina
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>

</body>

</html>
